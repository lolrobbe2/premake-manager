<!DOCTYPE html>
<html lang="en">

<head>

  <link rel="help" type="text/markdown"
    href="https://raw.githubusercontent.com/lolrobbe2/premake-manager/main/llms.txt">
  <meta name="robots" content="index, follow, snippet">

  <meta charset="UTF-8">
  <title>Premake Manager | CLI & VS Code Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <meta name="description" content="Official documentation for Premake Manager.">
  <meta name="author" content="lolrobbe2">

  <link rel="icon" href="favicon.ico" type="image/x-icon">

  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css"
    title="docsify-darklight-theme" type="text/css" />

  <style>
    .llm-badge {
      display: block;
      margin: 10px 15px;
      padding: 5px;
      border: 1px solid #42b983;
      border-radius: 4px;
      text-align: center;
      font-size: 0.75rem;
      color: #42b983;
      text-decoration: none;
    }

    body.dark .llm-badge {
      border-color: #ea6f5a;
      color: #ea6f5a;
    }

    /* Version Selector Styling */
    #v-select {
      background-color: #f8f8f8;
      cursor: pointer;
      font-size: 0.85rem;
      color: #34495e;
      width: 100%;
      padding: 4px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    body.dark #v-select {
      background-color: #2c3e50;
      color: #ecf0f1;
      border-color: #444;
    }

    /* Fix search UI in dark mode */
    body.dark .search input {
      background-color: #0e2233;
      color: white;
      border-color: #0d2538;
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <script>
    const isLocalHost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
    const versions = { 'Main (GitHub)': 'main' };

    let versionList = { ...versions };
    if (isLocalHost) versionList = Object.assign({ 'Local Development': 'local' }, versions);

    const urlParams = new URLSearchParams(window.location.search);
    const currentVersion = urlParams.get('v') || (isLocalHost ? 'local' : 'main');

    const computedPath = currentVersion === 'local' ? './' : `https://raw.githubusercontent.com/lolrobbe2/premake-manager/${currentVersion}/website/`;

    window.$docsify = {
      name: 'premake manager',
      basePath: computedPath,
      loadSidebar: true,
      alias: {
        '/.*/_sidebar.md': '_sidebar.md',

      },
      repo: 'https://github.com/lolrobbe2/premake-manager',
      // Search configuration to reduce raw markdown artifacts
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search...',
        noData: 'No results!',
        depth: 6,
        namespace: 'premake-' + currentVersion
      },

      darklightTheme: {
        defaultTheme: 'dark'
      },

      // Copy code button configuration
      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied'
      },

      plugins: [
        function (hook, vm) {
          hook.beforeEach(function (content, next) {
            // Check if we are on the llms.txt route
            if (vm.route.path === '/llms.txt') {
              fetch('https://raw.githubusercontent.com/lolrobbe2/premake-manager/main/llms.txt')
                .then(res => res.text())
                .then(text => {
                  // Wrap the raw text in a code block so it renders in the UI
                  next('# LLM Reference\n\n```text\n' + text + '\n```');
                });
            } else {
              next(content);
            }
          });

          hook.ready(function () {
            const titleContainer = document.querySelector('.app-name');
            if (titleContainer) {
              const selectHTML = `
              <div id="v-container" style="margin-top: 10px;">
                <select id="v-select">
                  ${Object.entries(versionList).map(([name, value]) =>
                `<option value="${value}" ${currentVersion === value ? 'selected' : ''}>${name}</option>`
              ).join('')}
                </select>
              </div>`;
              titleContainer.insertAdjacentHTML('beforeend', selectHTML);
            }
          });
        }
      ]
    };

    document.addEventListener('change', function (e) {
      if (e.target && e.target.id === 'v-select') {
        window.location.href = window.location.origin + window.location.pathname + '?v=' + e.target.value;
      }
    }, true);
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-plugin-flexible-alerts"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1"></script>
</body>

</html>
