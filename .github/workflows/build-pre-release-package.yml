name: Build and publish prerelease
permissions:
  contents: write
# This section defines what triggers the workflow
on:
  push:
    branches:
      - main  # Only runs when code is pushed to the main branch
    tags:
      - 'v*'
    paths-ignore:
      - 'website/**' #ignore the website folder otherwise we will update the market version needlesly
      - '.github/**' #ignore the website folder otherwise we will update the market version needlesly

  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual test/deploy'
jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        
      - name: Determine Release Type
        id: release_type
        run: |
          # Check if the ref starts with the version tag prefix OR manual input is true
          if [[ "${{ startsWith(github.ref, 'refs/tags/v') }}" == "true" ]] || [[ "${{ github.event.inputs.is_stable }}" == "true" ]]; then
            echo "Publishing STABLE release"
            echo "RELEASE_FLAG=" >> $GITHUB_ENV
            echo "IS_PRE_RELEASE=false" >> $GITHUB_ENV
          else
            echo "Publishing PRE-RELEASE"
            echo "RELEASE_FLAG=--pre-release" >> $GITHUB_ENV
            echo "IS_PRE_RELEASE=true" >> $GITHUB_ENV
          fi
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Set Dynamic Version
        run: |
          # Calculate the version
          NEW_VERSION=$(node -e "
            const pkg = require('./package.json');
            let [major, minor, patch] = pkg.version.split('-')[0].split('.').map(Number);
            
            if ('${{ env.IS_PRE_RELEASE }}' === 'false') {
              console.log(\`\${major}.\${minor + 1}.0\`);
            } else {
              console.log(\`\${major}.\${minor}.\${patch + 1}\`);
            }
          ")
          
          # Set the version in package.json
          npm version "$NEW_VERSION" --no-git-tag-version
          
          # Save to ENV for later steps
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "Version set to: $NEW_VERSION"

      - name: Commit version bump (Stable Only)
        if: startsWith(github.ref, 'refs/tags/v') == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          # [skip ci] prevents this commit from triggering the workflow again
          git commit -m "release: bump version to ${{ env.NEW_VERSION }} [skip ci]"
          git push origin main

      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-cache
        with:
          path: |
            node_modules
            **/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm install  # This triggers 'postinstall' which runs 'setup-views'
      - name: Package extension
        run: |
          npx @vscode/vsce package ${{ env.RELEASE_FLAG }}
          TEMP_VSIX=$(ls *.vsix)
          echo "VSIX_PATH=$TEMP_VSIX" >> $GITHUB_ENV
          echo "vsix_name=$TEMP_VSIX" >> $GITHUB_OUTPUT

      - name: Upload VSIX Artifact  
        uses: actions/upload-artifact@v7
        with:
          name: premake-manager-dev.vsix
          path: ${{ env.VSIX_PATH }}
          retention-days: 14
          archive: false

      - name: Publish to Visual Studio Marketplace
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: ${{ secrets.MARKET_PLACE_TOKEN }}
          registryUrl: https://marketplace.visualstudio.com
          extensionFile: ${{ env.VSIX_PATH }}  # Point it to your existing file
          preRelease: ${{ env.IS_PRE_RELEASE }}
          skipDuplicate: false 
  upload-to-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-artifact
          path: ./assets

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./assets/*.vsix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
